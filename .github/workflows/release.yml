name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

# Tag-triggered Velopack release. Foldfinch ships for Windows and macOS, so a matrix builds, packs,
# and uploads per-OS installers to the same GitHub Release. PDFium/SkiaSharp native assets are
# pulled in per-RID by the self-contained publish.
#
# Each RID packs into its OWN Velopack channel (== the RID). Without this both macOS RIDs default to
# the shared `osx` channel and produce identically-named assets (Foldfinch-osx-Setup.pkg,
# Foldfinch-<v>-osx-full.nupkg, releases.osx.json) — so the two jobs clobber each other on the single
# GitHub Release. A distinct channel suffixes every file apart. At runtime a null-channel UpdateManager
# auto-detects the channel the build was made for, so the in-app updater needs no change. Windows keeps
# the legacy `win` channel (its filenames are already unique).
jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            rid: win-x64
            channel: win
            mainExe: foldfinch.exe
          - os: macos-latest
            rid: osx-arm64
            channel: osx-arm64
            mainExe: foldfinch
          - os: macos-13
            rid: osx-x64
            channel: osx-x64
            mainExe: foldfinch
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Install vpk CLI
        run: dotnet tool install -g vpk

      - name: Get version from tag
        id: version
        shell: bash
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Publish
        shell: bash
        run: |
          dotnet publish src/Foldfinch.App/Foldfinch.App.csproj -c Release -r ${{ matrix.rid }} \
            --self-contained true \
            -p:Version=${{ steps.version.outputs.VERSION }} \
            -o publish/

      - name: Pack with Velopack
        shell: bash
        run: |
          vpk pack \
            --packId Foldfinch \
            --packTitle "Foldfinch" \
            --packVersion ${{ steps.version.outputs.VERSION }} \
            --channel ${{ matrix.channel }} \
            --packDir publish/ \
            --mainExe ${{ matrix.mainExe }} \
            --outputDir releases/

      # Drop the portable .zip — we ship the Setup installer plus the Velopack update feed
      # (nupkg + RELEASES + releases.*.json), not the loose portable build.
      - name: Drop portable .zip (not shipped)
        shell: bash
        run: rm -f releases/*-Portable.zip

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: releases/*
          generate_release_notes: true
