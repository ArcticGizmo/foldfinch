name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-test:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore foldfinch.slnx

      - name: Build
        run: dotnet build foldfinch.slnx --no-restore --configuration Release

      - name: Test
        run: dotnet test foldfinch.slnx --no-build --configuration Release --verbosity minimal
